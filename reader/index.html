<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>LiquidFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Library shelf / book picker -->
    <div id="shelf" class="view active">
      <header class="shelf-header">
        <span class="logo">⟡ LiquidFlow</span>
        <span class="tagline">animated ebooks</span>
      </header>
      <div id="book-grid" class="book-grid"></div>
    </div>

    <!-- Reader view -->
    <div id="reader-view" class="view">
      <!-- Toolbar is injected here by createToolbar() -->

      <div class="canvas-stack">
        <!-- Main canvas for pretext rendering -->
        <canvas id="reader-canvas" aria-label="Book content"></canvas>
        
        <!-- Transition canvas for background effects -->
        <canvas id="transition-canvas" aria-label="Background animations"></canvas>
      </div>

      <!-- Lookup card (entity info / AI result) -->
      <div id="lookup-card" class="lookup-card hidden" role="dialog" aria-modal="true">
        <button class="lookup-close" aria-label="Close">×</button>
        <div class="lookup-title"></div>
        <div class="lookup-body"></div>
      </div>

      <!-- Scene info / page numbers -->
      <div id="scene-info" class="scene-info"></div>

      <!-- Scrubber / Progress Bar -->
      <div id="progress-bar" class="progress-bar" title="Drag to scrub through book">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
