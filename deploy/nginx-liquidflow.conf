# LiquidFlow behind nginx (HTTPS)
#
# 1. Start app:  pm2 start /home/stephen/projects/LiquidFlow/ecosystem.config.cjs
# 2. Copy this file to nginx (requires sudo):
#    sudo cp deploy/nginx-liquidflow.conf /etc/nginx/sites-available/liquidflow.a2m.one.conf
#    sudo ln -sf /etc/nginx/sites-available/liquidflow.a2m.one.conf /etc/nginx/sites-enabled/
#    sudo certbot certonly --nginx -d liquidflow.a2m.one   # or your DNS-01 flow
#    sudo nginx -t && sudo systemctl reload nginx
#
# Create-story can run 10+ minutes — long proxy_read_timeout is intentional.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name liquidflow.a2m.one;

    ssl_certificate /etc/letsencrypt/live/liquidflow.a2m.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liquidflow.a2m.one/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:9325;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name liquidflow.a2m.one;
    return 301 https://$host$request_uri;
}